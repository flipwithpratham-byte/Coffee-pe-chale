<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Savi</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: black;
    overflow: hidden;
    color: white;
}

/* screens */
.screen {
    position: absolute;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: 1s;
}

/* first screen */
#screen1 {
    background: linear-gradient(135deg, #1a1a1a, #000);
    z-index: 2;
}

/* second screen */
#screen2 {
    background: radial-gradient(circle, #111, #000);
    opacity: 0;
    transform: scale(1.2);
    z-index: 1;
}

/* active screen */
.show {
    opacity: 1 !important;
    transform: scale(1) !important;
    z-index: 3 !important;
}

h1 {
    font-size: 30px;
    text-align: center;
}

/* buttons */
button {
    padding: 14px 28px;
    margin: 15px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

#yesBtn {
    background: #00c853;
    color: white;
}

#noBtn {
    background: #333;
    color: #aaa;
}

/* message */
#message {
    max-width: 85%;
    font-size: 20px;
    line-height: 1.6;
    text-align: center;
    opacity: 0;
    transition: 2s;
}

/* particles */
.particle {
    position: fixed;
    width: 3px;
    height: 3px;
    background: white;
    opacity: 0.3;
    border-radius: 50%;
    animation: float 6s linear infinite;
}

@keyframes float {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<!-- 🎵 music -->
<iframe id="music" width="0" height="0" frameborder="0" allow="autoplay"></iframe>

<!-- Screen 1 -->
<div id="screen1" class="screen">
    <h1>Savi… will you go for coffee with me? ☕</h1>
    <div>
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No</button>
    </div>
</div>

<!-- Screen 2 -->
<div id="screen2" class="screen">
    <div id="message">
        Savi…<br><br>

        You matter to me more than I say.  
        When you weren’t okay… it hurt.<br><br>

        It felt like something wasn’t right inside me.  
        Maybe weird… but real.<br><br>

        I just want to see you smile… always ❤️<br><br>

        So… coffee? ☕
    </div>
</div>

<script>
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");
let screen1 = document.getElementById("screen1");
let screen2 = document.getElementById("screen2");
let message = document.getElementById("message");

let noSize = 16;

// ✅ YES click
yesBtn.onclick = function() {
    screen1.style.opacity = "0";
    screen1.style.transform = "scale(0.8)";

    screen2.classList.add("show");

    setTimeout(() => {
        message.style.opacity = "1";
    }, 800);

    // 🎵 start music
    document.getElementById("music").src =
    "https://www.youtube.com/embed/5Eqb_-j3FDA?autoplay=1&loop=1&playlist=5Eqb_-j3FDA";
};

// ✅ NO click (shrink)
noBtn.onclick = function() {
    noSize -= 2;

    noBtn.style.fontSize = noSize + "px";
    noBtn.style.padding = (noSize/2) + "px " + noSize + "px";

    if (noSize <= 6) {
        noBtn.style.display = "none";
    }
};

// particles
setInterval(() => {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(p);

    setTimeout(() => p.remove(), 6000);
}, 200);
</script>

</body>
</html>
