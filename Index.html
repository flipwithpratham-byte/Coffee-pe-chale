<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coffee ?? ☕</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffecd2, #fcb69f);
  font-family: sans-serif;
  overflow: hidden;
}

.container {
  text-align: center;
}

h1 {
  font-size: 30px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
}

#yesBtn {
  background: #4caf50;
  color: white;
}

#noBtn {
  background: #ff4d4d;
  color: white;
  position: absolute;
}

#successScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #4caf50;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  transform: scale(0);
  transition: 0.5s ease;
}

#successScreen.active {
  transform: scale(1);
}
</style>
</head>

<body>

<div class="container">
  <h1>So savi....Will you go for coffee with me? ☕</h1>
  <button id="yesBtn">Yes 💖</button>
  <button id="noBtn">No 😢</button>
</div>

<div id="successScreen">Yesss! Coffee Fixed ☕😍</div>

<script>
let noBtn = document.getElementById("noBtn");
let yesBtn = document.getElementById("yesBtn");
let success = document.getElementById("successScreen");

let scale = 1;

noBtn.addEventListener("mouseover", () => {
  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  scale -= 0.05;
  noBtn.style.transform = "scale(" + scale + ")";

  if (scale <= 0.3) {
    noBtn.style.display = "none";
  }
});

yesBtn.onclick = () => {
  success.classList.add("active");
};
</script>

</body>
</html>
