<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savi 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #ffeff7;
    overflow: hidden;
    color: #333;
}

/* screens */
.screen {
    position: absolute;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: 1s;
}

/* first screen */
#screen1 {
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
    z-index: 2;
}

/* second screen */
#screen2 {
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
    opacity: 0;
    transform: scale(1.2);
    z-index: 1;
}

/* active screen */
.show {
    opacity: 1 !important;
    transform: scale(1) !important;
    z-index: 3 !important;
}

h1 {
    font-size: 28px;
    text-align: center;
    color: #fff;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* buttons */
button {
    padding: 14px 28px;
    margin: 15px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

#yesBtn {
    background: #ff4081;
    color: white;
    box-shadow: 0 0 15px rgba(255,64,129,0.6);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

#noBtn {
    background: #fff;
    color: #ff4081;
    border: 2px solid #ff4081;
}

/* message */
#message {
    max-width: 85%;
    font-size: 20px;
    line-height: 1.6;
    text-align: center;
    opacity: 0;
    transition: 2s;
    color: #fff;
}

/* floating hearts */
.heart {
    position: fixed;
    font-size: 24px;
    color: #ff4081;
    animation: float 6s linear infinite;
}

@keyframes float {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<!-- 🎵 music (YouTube embed, no file needed) -->
<iframe id="music" width="0" height="0" frameborder="0" allow="autoplay"></iframe>

<!-- Screen 1 -->
<div id="screen1" class="screen">
    <h1>Savi… will you be my coffee date? ☕💖</h1>
    <div>
        <button id="yesBtn">Yes 💕</button>
        <button id="noBtn">No 🙈</button>
    </div>
</div>

<!-- Screen 2 -->
<div id="screen2" class="screen">
    <div id="message">
        Savi…<br><br>
        Tum meri kahani ka sabse pyara hissa ho 🌸<br><br>
        Har din tumhari muskaan meri duniya roshan karti hai 💖<br><br>
        Coffee ke saath… ek chhoti si journey hum dono ki ☕✨<br><br>
        Will you share it with me? 💕
    </div>
</div>

<script>
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");
let screen1 = document.getElementById("screen1");
let screen2 = document.getElementById("screen2");
let message = document.getElementById("message");

let noSize = 16;

// ✅ YES click
yesBtn.onclick = function() {
    screen1.style.opacity = "0";
    screen1.style.transform = "scale(0.8)";
    setTimeout(() => screen1.style.display = "none", 800);

    screen2.classList.add("show");

    setTimeout(() => {
        message.style.opacity = "1";
    }, 800);

    // 🎵 start music (romantic track from YouTube)
    document.getElementById("music").src =
    "https://www.youtube.com/embed/5Eqb_-j3FDA?autoplay=1&loop=1&playlist=5Eqb_-j3FDA";
};

// ✅ NO click (shrink)
noBtn.onclick = function() {
    noSize -= 2;
    if (noSize <= 10) {
        noBtn.style.display = "none";
    } else {
        noBtn.style.fontSize = noSize + "px";
        noBtn.style.padding = (noSize/2) + "px " + noSize + "px";
    }
};

// floating hearts
setInterval(() => {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";
    h.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(h);

    setTimeout(() => h.remove(), 6000);
}, 400);
</script>

</body>
</html>
