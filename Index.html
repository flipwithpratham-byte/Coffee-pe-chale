<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Rhythm💖</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    overflow: hidden;
    color: #fff;
    text-align: center;
}
.screen {
    position: absolute;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: 1s;
}
#screen1 { background: linear-gradient(135deg, #ff9a9e, #fad0c4); z-index: 2; }
#screen2 { background: radial-gradient(circle, #ffdde1, #ee9ca7); opacity: 0; transform: scale(1.2); z-index: 1; }
.show { opacity: 1 !important; transform: scale(1) !important; z-index: 3 !important; }
h1 { font-size: 28px; animation: bounce 2s infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
button { padding:14px 28px; margin:15px; border-radius:30px; border:none; font-size:16px; cursor:pointer; transition:0.3s; position:relative; }
#yesBtn { background:#ff4081; color:white; box-shadow:0 0 15px rgba(255,64,129,0.6); animation:pulse 1.5s infinite; }
@keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.1);} 100%{transform:scale(1);} }
#noBtn { background:#fff; color:#ff4081; border:2px solid #ff4081; }
#message { max-width:85%; font-size:20px; line-height:1.6; text-align:center; opacity:0; transition:2s; color:#fff; }
#pandaReaction { font-size:40px; margin-top:20px; opacity:0; transition:0.5s; }
</style>
</head>

<body>

<!-- 🎵 music (HTML5 audio, no extra file needed if you use hosted MP3 link) -->
<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<!-- Screen 1 -->
<div id="screen1" class="screen">
    <h1>Rhythm… will you go for a coffee with me? ☕💖</h1>
    <div>
        <button id="yesBtn">Yes 💕</button>
        <button id="noBtn">No 🙈</button>
    </div>
    <div id="pandaReaction"></div>
</div>

<!-- Screen 2 -->
<div id="screen2" class="screen">
    <div id="message">
        hnjii…<br><br>
        chalo cutiee tumhe coffee pe leke chalu.<br><br>
        Maybe weird… but real.<br><br>
        nhi kar payi na NO.... mai hu hi itna khaas 😂🫶🏻<br><br>
        So… coffee? ☕
    </div>
</div>

<script>
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");
let screen1 = document.getElementById("screen1");
let screen2 = document.getElementById("screen2");
let message = document.getElementById("message");
let pandaReaction = document.getElementById("pandaReaction");
let bgMusic = document.getElementById("bgMusic");

let noSize = 16;

// ✅ YES click
yesBtn.onclick = function() {
    screen1.style.opacity = "0";
    screen1.style.transform = "scale(0.8)";
    setTimeout(() => screen1.style.display = "none", 800);

    screen2.classList.add("show");

    setTimeout(() => { message.style.opacity = "1"; }, 800);

    // Panda smile
    pandaReaction.innerHTML = "🐼💖";
    pandaReaction.style.opacity = "1";

    // 🎵 play music
    bgMusic.play();
};

// ✅ NO click (shrink + move + angry panda)
noBtn.onclick = function() {
    noSize -= 2;
    noBtn.style.fontSize = noSize + "px";
    noBtn.style.padding = (noSize/2) + "px " + noSize + "px";

    // random position shift
    noBtn.style.position = "absolute";
    noBtn.style.left = Math.random() * 80 + "vw";
    noBtn.style.top = Math.random() * 60 + "vh";

    // angry panda reaction
    pandaReaction.innerHTML = "🐼💔 No No!";
    pandaReaction.style.opacity = "1";

    if (noSize <= 10) {
        noBtn.style.display = "none";
    }
};
</script>

</body>
</html>
