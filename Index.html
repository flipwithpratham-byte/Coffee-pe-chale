<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Savi 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    overflow: hidden;
    color: #fff;
    text-align: center;
}

/* screens */
.screen {
    position: absolute;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: 1s;
}

/* first screen */
#screen1 {
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    z-index: 2;
}

/* second screen */
#screen2 {
    background: radial-gradient(circle, #ffdde1, #ee9ca7);
    opacity: 0;
    transform: scale(1.2);
    z-index: 1;
}

/* active screen */
.show {
    opacity: 1 !important;
    transform: scale(1) !important;
    z-index: 3 !important;
}

h1 {
    font-size: 28px;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* buttons */
button {
    padding: 14px 28px;
    margin: 15px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
}

#yesBtn {
    background: #ff4081;
    color: white;
    box-shadow: 0 0 15px rgba(255,64,129,0.6);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

#noBtn {
    background: #fff;
    color: #ff4081;
    border: 2px solid #ff4081;
}

/* message */
#message {
    max-width: 85%;
    font-size: 20px;
    line-height: 1.6;
    text-align: center;
    opacity: 0;
    transition: 2s;
    color: #fff;
}

/* panda + heart */
#pandaReaction {
    font-size: 40px;
    margin-top: 20px;
    opacity: 0;
    transition: 0.5s;
}
</style>
</head>

<body>

<!-- 🎵 music -->
<iframe id="music" width="0" height="0" frameborder="0" allow="autoplay"></iframe>

<!-- Screen 1 -->
<div id="screen1" class="screen">
    <h1>So… will you go for a coffee with me? ☕💖</h1>
    <div>
        <button id="yesBtn">Yes 💕</button>
        <button id="noBtn">No 🙈</button>
    </div>
    <div id="pandaReaction"></div>
</div>

<!-- Screen 2 -->
<div id="screen2" class="screen">
    <div id="message">
        Savi…<br><br>
        You matter to me more than I say.<br>
        When you weren’t okay… it hurt.<br><br>
        It felt like something wasn’t right inside me.<br>
        Maybe weird… but real.<br><br>
        I just want to see you smile… always ❤️<br><br>
        So… coffee? ☕
    </div>
</div>

<script>
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");
let screen1 = document.getElementById("screen1");
let screen2 = document.getElementById("screen2");
let message = document.getElementById("message");
let pandaReaction = document.getElementById("pandaReaction");

let noSize = 16;

// ✅ YES click
yesBtn.onclick = function() {
    screen1.style.opacity = "0";
    screen1.style.transform = "scale(0.8)";
    setTimeout(() => screen1.style.display = "none", 800);

    screen2.classList.add("show");

    setTimeout(() => {
        message.style.opacity = "1";
    }, 800);

    // Panda smile
    pandaReaction.innerHTML = "🐼💖";
    pandaReaction.style.opacity = "1";

    // 🎵 start music
    document.getElementById("music").src =
    "https://www.youtube.com/embed/5Eqb_-j3FDA?autoplay=1&loop=1&playlist=5Eqb_-j3FDA";
};

// ✅ NO click (shrink + move + angry panda)
noBtn.onclick = function() {
    noSize -= 2;
    noBtn.style.fontSize = noSize + "px";
    noBtn.style.padding = (noSize/2) + "px " + noSize + "px";

    // random position shift
    noBtn.style.position = "absolute";
    noBtn.style.left = Math.random() * 80 + "vw";
    noBtn.style.top = Math.random() * 60 + "vh";

    // angry panda reaction
    pandaReaction.innerHTML = "🐼💔 No No!";
    pandaReaction.style.opacity = "1";

    if (noSize <= 10) {
        noBtn.style.display = "none";
    }
};
</script>

</body>
</html>
